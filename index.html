<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureFile - 압축 & 암호화</title>
<style>
  :root { --bg:#0f1220; --card:#1a1f35; --accent:#6c8cff; --ok:#37d39b; --err:#ff6b6b; --muted:#8a93b2; --line:#2a3157; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; font-family:"Segoe UI",system-ui,sans-serif;
         background:radial-gradient(1200px 600px at 50% -10%,#23294a,var(--bg)); color:#eef1ff;
         display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:500px; background:var(--card); border:1px solid var(--line);
          border-radius:18px; padding:26px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .kdf { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:#222a4d; color:#9fb0ff; margin-left:6px; vertical-align:middle;}

  .drop { border:2px dashed #3a4275; border-radius:14px; padding:22px 16px; text-align:center;
          cursor:pointer; transition:.15s; background:#151a30; }
  .drop:hover, .drop.over { border-color:var(--accent); background:#1b2240; }
  .drop .big { font-size:30px; }
  .drop .name { margin-top:6px; font-size:13px; color:#cdd5ff; word-break:break-all; }
  .picks { display:flex; gap:8px; margin-top:10px; }
  .picks button { flex:1; padding:8px; font-size:12px; background:#222a4d; color:#cdd5ff;
                  border:1px solid #38406b; border-radius:9px; cursor:pointer; }
  .picks button:hover { border-color:var(--accent); }

  /* 토글 스위치 */
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-top:18px;
                padding:12px 14px; background:#151a30; border:1px solid var(--line); border-radius:12px; }
  .toggle-row .label { font-size:14px; font-weight:600; }
  .toggle-row .desc { font-size:11px; color:var(--muted); margin-top:2px; }
  .switch { position:relative; width:52px; height:28px; flex:none; }
  .switch input { display:none; }
  .slider { position:absolute; inset:0; background:#39406b; border-radius:28px; transition:.2s; cursor:pointer; }
  .slider:before { content:""; position:absolute; width:22px; height:22px; left:3px; top:3px;
                   background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider { background:var(--accent); }
  .switch input:checked + .slider:before { transform:translateX(24px); }

  #pwArea { margin-top:14px; transition:.2s; }
  .pw-wrap { display:flex; gap:8px; }
  input[type=text].pw, input[type=password].pw { flex:1; padding:12px 14px; border-radius:10px;
          border:1px solid #38406b; background:#10152a; color:#fff; font-size:15px; }
  input.pw:focus{ outline:none; border-color:var(--accent); }
  .icon-btn { width:44px; border:1px solid #38406b; background:#222a4d; color:#cdd5ff;
              border-radius:10px; cursor:pointer; font-size:15px; }
  .icon-btn:hover { border-color:var(--accent); }
  .keyrow { display:flex; gap:8px; margin-top:8px; }
  .keyrow button { flex:1; padding:9px; font-size:12px; background:#1d243f;
                   color:#9fb0ff; border:1px solid #38406b; border-radius:9px; cursor:pointer; }
  .keyrow button:hover { border-color:var(--accent); }

  .row { display:flex; gap:10px; margin-top:16px; }
  .row button { flex:1; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:.15s; }
  .go { background:var(--accent); color:#fff; }
  .open { background:#2a3157; color:#dfe4ff; }
  .row button:hover{ filter:brightness(1.1); } button:disabled{ opacity:.5; cursor:not-allowed; }

  .bar { height:8px; background:#10152a; border-radius:6px; margin-top:16px; overflow:hidden; display:none; }
  .bar > div { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--ok)); transition:width .1s; }
  .status { margin-top:12px; font-size:13px; min-height:18px; }
  .status.ok{ color:var(--ok);} .status.err{ color:var(--err);} .status.info{ color:var(--muted);}
  .foot { margin-top:16px; font-size:11px; color:var(--muted); line-height:1.6; border-top:1px solid var(--line); padding-top:12px;}
</style>
</head>
<body>
  <div class="card">
    <h1>🔐 SecureFile <span class="kdf" id="kdfTag">KDF 확인 중…</span></h1>
    <div class="sub">파일/폴더를 <b>압축</b>하고, 원하면 <b>암호화</b>까지. 파일은 이 브라우저 밖으로 나가지 않습니다.</div>

    <div class="drop" id="drop">
      <div class="big">📁</div>
      <div>파일을 끌어다 놓거나 클릭해서 선택</div>
      <div class="name" id="fname"></div>
      <input type="file" id="file" hidden>
      <input type="file" id="fileMulti" hidden multiple>
      <input type="file" id="fileDir" hidden webkitdirectory>
    </div>
    <div class="picks">
      <button id="pickMulti">📄 여러 파일</button>
      <button id="pickDir">📁 폴더</button>
    </div>

    <!-- 암호화 ON/OFF 토글 -->
    <div class="toggle-row">
      <div>
        <div class="label">🔒 암호화</div>
        <div class="desc" id="toggleDesc">켜면 비밀번호로 암호화(.sfw) · 끄면 압축만(.gz)</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="encToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- 비밀번호 / 보안키 -->
    <div id="pwArea">
      <div class="pw-wrap">
        <input type="password" id="pw" class="pw" placeholder="비밀번호 또는 보안키">
        <button class="icon-btn" id="eyeBtn" title="보기/숨기기">👁</button>
      </div>
      <div class="keyrow">
        <button id="genKey">🔑 강력한 보안키 생성</button>
        <button id="copyKey">📋 복사</button>
      </div>
    </div>

    <div class="row">
      <button class="go" id="goBtn">🔒 압축 + 암호화</button>
      <button class="open" id="openBtn">📂 열기 (해제)</button>
    </div>

    <div class="bar" id="bar"><div id="barFill"></div></div>
    <div class="status info" id="status"></div>

    <div class="foot">
      압축: gzip · 암호화: AES-256-GCM · 키 유도: Argon2id(가능 시) / PBKDF2<br>
      "열기"는 .sfw(암호화) / .gz·.tar.gz(압축)를 자동 구분합니다.<br>
      ⚠️ 보안키·비밀번호를 잃으면 암호화 파일은 복구 불가입니다.
    </div>
  </div>

<script>
const MAGIC = new TextEncoder().encode("SFW2");
const CHUNK = 1024 * 1024;
const KDF_ARGON2 = 1, KDF_PBKDF2 = 0;
const $ = id => document.getElementById(id);
let selected = null;          // { mode:'single'|'bundle', files:[File], name }
let argon2id = null;

// ---------- 유틸 ----------
function concat(arrays){
  let len = arrays.reduce((s,a)=>s+a.length,0), out = new Uint8Array(len), p = 0;
  for(const a of arrays){ out.set(a,p); p += a.length; } return out;
}
const u32 = n => { const b=new Uint8Array(4); new DataView(b.buffer).setUint32(0,n); return b; };
const readU32 = b => new DataView(b.buffer, b.byteOffset, 4).getUint32(0);
function setStatus(msg, cls){ const s=$("status"); s.textContent=msg; s.className="status "+(cls||"info"); }
function setProgress(p){ $("bar").style.display="block"; $("barFill").style.width=Math.round(p*100)+"%"; }
function hideProgress(){ $("bar").style.display="none"; $("barFill").style.width="0%"; }
function download(blob, name){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}

// ---------- TAR 묶기 (여러 파일/폴더) ----------
function tarHeader(name, size){
  const h = new Uint8Array(512), enc = new TextEncoder();
  const put = (str, off, len) => h.set(enc.encode(str).slice(0, len), off);
  put(name,0,100); put("0000644\0",100,8); put("0000000\0",108,8); put("0000000\0",116,8);
  put(size.toString(8).padStart(11,"0")+"\0",124,12);
  put(Math.floor(Date.now()/1000).toString(8).padStart(11,"0")+"\0",136,12);
  for(let i=148;i<156;i++) h[i]=0x20; h[156]=0x30;
  put("ustar\0",257,6); put("00",263,2);
  let sum=0; for(let i=0;i<512;i++) sum+=h[i];
  put(sum.toString(8).padStart(6,"0")+"\0 ",148,8);
  return h;
}
function buildTar(entries){
  const parts=[];
  for(const e of entries){
    parts.push(tarHeader(e.name, e.data.length), e.data);
    const pad=(512-(e.data.length%512))%512; if(pad) parts.push(new Uint8Array(pad));
  }
  parts.push(new Uint8Array(1024)); return concat(parts);
}

// ---------- Argon2 로드 ----------
function loadArgon2(){
  return new Promise(resolve=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/hash-wasm@4.12.0/dist/argon2.umd.min.js";
    s.onload = ()=>{ argon2id = window.hashwasm.argon2id; $("kdfTag").textContent="Argon2id"; resolve(); };
    s.onerror= ()=>{ $("kdfTag").textContent="PBKDF2 (오프라인)"; resolve(); };
    document.head.appendChild(s);
  });
}
async function deriveKeyArgon2(password, salt, mem, iters, par){
  const raw = await argon2id({ password, salt, parallelism:par, iterations:iters, memorySize:mem, hashLength:32, outputType:"binary" });
  return crypto.subtle.importKey("raw", raw, "AES-GCM", false, ["encrypt","decrypt"]);
}
async function deriveKeyPBKDF2(password, salt, iters){
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name:"PBKDF2", salt, iterations:iters, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
}

// ---------- 압축+암호화 (.sfw) ----------
async function encryptSource(stream, total, isBundle, outName, password){
  const useArgon = !!argon2id;
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const noncePrefix = crypto.getRandomValues(new Uint8Array(8));
  const argonMem=65536, argonIters=3, argonPar=1, pbkIters=200000;
  setStatus("키 생성 중…","info");
  const key = useArgon ? await deriveKeyArgon2(password, salt, argonMem, argonIters, argonPar)
                       : await deriveKeyPBKDF2(password, salt, pbkIters);
  const flags = isBundle ? 1 : 0;
  const parts = [MAGIC, Uint8Array.of(flags), Uint8Array.of(useArgon?KDF_ARGON2:KDF_PBKDF2)];
  if(useArgon) parts.push(u32(argonMem), u32(argonIters), Uint8Array.of(argonPar));
  else parts.push(u32(pbkIters));
  parts.push(salt, noncePrefix);

  let processed=0; const t = total||1;
  const counter = new TransformStream({ transform(c,ctrl){ processed+=c.length; setProgress(processed/t); ctrl.enqueue(c);} });
  const reader = stream.pipeThrough(counter).pipeThrough(new CompressionStream("gzip")).getReader();
  let ctr=0;
  async function emit(data, final){
    const nonce = concat([noncePrefix, u32(ctr)]);
    const aad = concat([u32(ctr), Uint8Array.of(final?1:0)]);
    const ct = new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM", iv:nonce, additionalData:aad}, key, data));
    parts.push(Uint8Array.of(final?1:0), u32(ct.length), ct); ctr++;
  }
  let buf = new Uint8Array(0);
  while(true){
    const {value, done} = await reader.read(); if(done) break;
    buf = concat([buf, value]);
    while(buf.length >= CHUNK){ await emit(buf.slice(0,CHUNK), false); buf = buf.slice(CHUNK); }
  }
  while(buf.length > CHUNK){ await emit(buf.slice(0,CHUNK), false); buf = buf.slice(CHUNK); }
  await emit(buf, true);
  setProgress(1);
  download(new Blob(parts), outName);
}

// ---------- 압축만 (.gz / .tar.gz) ----------
async function compressOnly(stream, total, outName){
  let processed=0; const t=total||1;
  const counter = new TransformStream({ transform(c,ctrl){ processed+=c.length; setProgress(processed/t); ctrl.enqueue(c);} });
  const cs = stream.pipeThrough(counter).pipeThrough(new CompressionStream("gzip"));
  const blob = await new Response(cs).blob();
  setProgress(1);
  download(blob, outName);
}

// ---------- 해제 ----------
function makeReader(stream, total){
  const r = stream.getReader();
  let buf = new Uint8Array(0), done=false, read=0;
  return { async exact(n){
    while(buf.length < n && !done){
      const {value, done:d} = await r.read(); if(d){ done=true; break; }
      buf = concat([buf, value]); read += value.length; setProgress(read/total);
    }
    if(buf.length < n) return null;
    const out = buf.slice(0,n); buf = buf.slice(n); return out;
  }};
}
async function decryptSfw(file, password){
  const sr = makeReader(file.stream(), file.size||1);
  const magic = await sr.exact(4);
  if(!magic || new TextDecoder().decode(magic) !== "SFW2") throw new Error("올바른 .sfw 파일이 아닙니다.");
  const flags = (await sr.exact(1))[0];
  const isBundle = (flags & 1) === 1;
  const kdfId = (await sr.exact(1))[0];
  let key, noncePrefix;
  setStatus("키 생성 중…","info");
  if(kdfId === KDF_ARGON2){
    if(!argon2id) throw new Error("이 파일은 Argon2로 만들어졌는데 라이브러리를 못 불러왔어요(인터넷 필요).");
    const mem=readU32(await sr.exact(4)), iters=readU32(await sr.exact(4)), par=(await sr.exact(1))[0];
    const salt=await sr.exact(16); noncePrefix=await sr.exact(8);
    key = await deriveKeyArgon2(password, salt, mem, iters, par);
  } else {
    const iters=readU32(await sr.exact(4));
    const salt=await sr.exact(16); noncePrefix=await sr.exact(8);
    key = await deriveKeyPBKDF2(password, salt, iters);
  }
  const plainParts=[]; let ctr=0;
  while(true){
    const head = await sr.exact(5);
    if(head===null) throw new Error("파일이 잘렸습니다(끝 표시 없음).");
    const final = head[0]===1;
    const clen = readU32(head.slice(1,5));
    const ct = await sr.exact(clen);
    if(ct===null) throw new Error("파일이 손상되었습니다.");
    const nonce = concat([noncePrefix, u32(ctr)]);
    const aad = concat([u32(ctr), Uint8Array.of(final?1:0)]);
    let pt;
    try{ pt = new Uint8Array(await crypto.subtle.decrypt({name:"AES-GCM", iv:nonce, additionalData:aad}, key, ct)); }
    catch(e){ throw new Error("복호화 실패: 비밀번호/보안키가 틀렸거나 파일이 변조되었습니다."); }
    plainParts.push(pt); ctr++; if(final) break;
  }
  const ds = new Blob(plainParts).stream().pipeThrough(new DecompressionStream("gzip"));
  const out = await new Response(ds).blob();
  setProgress(1);
  let name = file.name.endsWith(".sfw") ? file.name.slice(0,-4) : file.name + ".dec";
  if(isBundle && !name.endsWith(".tar")) name += ".tar";
  download(out, name);
}
async function decompressGz(file){
  const ds = file.stream().pipeThrough(new DecompressionStream("gzip"));
  const out = await new Response(ds).blob();
  setProgress(1);
  let name = file.name;
  if(name.endsWith(".tar.gz")) name = name.slice(0,-3);
  else if(name.endsWith(".tgz")) name = name.slice(0,-4)+".tar";
  else if(name.endsWith(".gz")) name = name.slice(0,-3);
  else name = name + ".out";
  download(out, name);
}

// ---------- 선택 처리 ----------
function pickSingle(f){ if(!f) return; selected={mode:"single", files:[f], name:f.name};
  $("fname").textContent="📄 "+f.name+" ("+f.size.toLocaleString()+" bytes)"; setStatus(""); }
function pickBundle(fileList, label){
  const files=[...fileList]; if(!files.length) return;
  if(files.length===1 && !files[0].webkitRelativePath) return pickSingle(files[0]);
  const rel=files[0].webkitRelativePath;
  const base = rel ? rel.split("/")[0] : "bundle";
  const total = files.reduce((s,f)=>s+f.size,0);
  selected={mode:"bundle", files, name:base};
  $("fname").textContent="📦 "+label+": "+files.length+"개 파일 ("+total.toLocaleString()+" bytes)";
  setStatus("");
}

// ---------- 처리(압축[+암호화]) ----------
async function doProcess(){
  if(!selected) return setStatus("먼저 파일/폴더를 선택하세요.","err");
  const encOn = $("encToggle").checked;
  const pw = $("pw").value;
  if(encOn && !pw) return setStatus("비밀번호 또는 보안키를 입력/생성하세요.","err");
  $("goBtn").disabled=$("openBtn").disabled=true; hideProgress();
  setStatus(encOn ? "압축 + 암호화 중…" : "압축 중…","info");
  try{
    const t=performance.now();
    // 입력 스트림 구성
    let stream, total, isBundle, base=selected.name;
    if(selected.mode==="single"){
      const f=selected.files[0]; stream=f.stream(); total=f.size; isBundle=false;
    } else {
      setStatus("파일 묶는 중…","info");
      const entries=[];
      for(const f of selected.files)
        entries.push({ name:(f.webkitRelativePath||f.name).slice(0,100), data:new Uint8Array(await f.arrayBuffer()) });
      const tar=buildTar(entries); stream=new Blob([tar]).stream(); total=tar.length; isBundle=true;
    }
    if(encOn){
      await encryptSource(stream, total, isBundle, base + ".sfw", pw);
      setStatus("암호화 완료! 다운로드됨 ("+((performance.now()-t)/1000).toFixed(1)+"초)","ok");
    } else {
      const outName = isBundle ? base + ".tar.gz" : base + ".gz";
      await compressOnly(stream, total, outName);
      setStatus("압축 완료! 다운로드됨 ("+((performance.now()-t)/1000).toFixed(1)+"초)","ok");
    }
  }catch(e){ setStatus(e.message, "err"); hideProgress(); }
  finally{ $("goBtn").disabled=$("openBtn").disabled=false; }
}

// ---------- 열기(자동 감지) ----------
async function doOpen(){
  if(!selected || selected.mode!=="single") return setStatus("열 파일 1개를 선택하세요.","err");
  const file=selected.files[0];
  const isSfw = file.name.endsWith(".sfw");
  $("goBtn").disabled=$("openBtn").disabled=true; hideProgress();
  setStatus("여는 중…","info");
  try{
    const t=performance.now();
    if(isSfw){
      const pw=$("pw").value;
      if(!pw) throw new Error("암호화 파일입니다. 비밀번호/보안키를 입력하세요.");
      await decryptSfw(file, pw);
      setStatus("복호화 완료! ("+((performance.now()-t)/1000).toFixed(1)+"초)","ok");
    } else {
      await decompressGz(file);
      setStatus("압축 해제 완료! ("+((performance.now()-t)/1000).toFixed(1)+"초)","ok");
    }
  }catch(e){ setStatus(e.message,"err"); hideProgress(); }
  finally{ $("goBtn").disabled=$("openBtn").disabled=false; }
}

// ---------- 보안키 생성 ----------
function genSecureKey(){
  const b = crypto.getRandomValues(new Uint8Array(24));   // 192비트
  const key = btoa(String.fromCharCode(...b)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
  const el=$("pw"); el.value=key; el.type="text";
  setStatus("강력한 보안키 생성됨 — 안전한 곳에 꼭 저장하세요! (복사 버튼 이용)","ok");
}

// ---------- UI 연결 ----------
const drop=$("drop");
drop.onclick = ()=> $("file").click();
$("file").onchange = e => pickSingle(e.target.files[0]);
$("fileMulti").onchange = e => pickBundle(e.target.files, "여러 파일");
$("fileDir").onchange = e => pickBundle(e.target.files, "폴더");
$("pickMulti").onclick = ()=> $("fileMulti").click();
$("pickDir").onclick = ()=> $("fileDir").click();
["dragover","dragenter"].forEach(ev=> drop.addEventListener(ev, e=>{e.preventDefault(); drop.classList.add("over");}));
["dragleave","drop"].forEach(ev=> drop.addEventListener(ev, e=>{e.preventDefault(); drop.classList.remove("over");}));
drop.addEventListener("drop", e=>{ const fs=e.dataTransfer.files; if(fs.length>1) pickBundle(fs,"여러 파일"); else pickSingle(fs[0]); });

// 토글: 암호화 on/off → 비번 영역 표시 + 버튼 라벨
function syncToggle(){
  const on=$("encToggle").checked;
  $("pwArea").style.display = on ? "block" : "none";
  $("goBtn").textContent = on ? "🔒 압축 + 암호화" : "🗜️ 압축만";
  $("toggleDesc").textContent = on ? "켜면 비밀번호로 암호화(.sfw)" : "압축만 합니다 (.gz / .tar.gz)";
}
$("encToggle").onchange = syncToggle;

// 비번 보기 토글
$("eyeBtn").onclick = ()=>{ const el=$("pw"); el.type = el.type==="password" ? "text" : "password"; };
$("genKey").onclick = genSecureKey;
$("copyKey").onclick = async ()=>{
  const v=$("pw").value; if(!v) return setStatus("복사할 키가 없습니다.","err");
  try{ await navigator.clipboard.writeText(v); setStatus("보안키를 클립보드에 복사했습니다.","ok"); }
  catch(e){ setStatus("복사 실패 — 직접 선택해 복사하세요.","err"); }
};

$("goBtn").onclick = doProcess;
$("openBtn").onclick = doOpen;

syncToggle();
loadArgon2();
</script>
</body>
